{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">Edit {{ name }}</h2>
<div class="card p-4" style="max-width:600px">
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Ticker</label>
            <input type="text" name="ticker" class="form-control"
                   value="{{ company.c.ticker or '' }}">
        </div>
        <div class="mb-3">
            <label class="form-label">SIC Code</label>
            <input type="text" name="sic_code" class="form-control"
                   value="{{ company.c.sic_code or '' }}">
        </div>
        <div class="mb-3">
            <label class="form-label">State</label>
            <input type="text" name="state" class="form-control"
                   value="{{ company.c.state or '' }}">
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="/companies/{{ name }}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>
{% endblock %}
