{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">Dashboard</h2>
<div class="row mb-4">
    {% for item in counts %}
    <div class="col-md-2 mb-3">
        <div class="card stat-card p-3">
            <div class="text-muted small">{{ item.type }}</div>
            <div class="fs-3 fw-bold text-primary">{{ item.count }}</div>
        </div>
    </div>
    {% endfor %}
</div>
<div class="card p-4">
    <h5>Recent Complaints</h5>
    <table class="table table-hover mt-2">
        <thead><tr><th>Company</th><th>Product</th><th>Date</th></tr></thead>
        <tbody>
            {% for c in recent_complaints %}
            <tr>
                <td>
                    <a href="/companies/{{ c.company }}"
                    class="text-decoration-none fw-semibold">
                        {{ c.company }}
                    </a>
                    <a href="/risk/{{ c.company }}"
                    class="badge bg-danger ms-1 text-decoration-none">
                        Risk
                    </a>
                </td>
                <td>{{ c.product }}</td>
                <td>{{ c.date }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
